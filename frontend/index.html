<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLCF Stock Forecast</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">MLCF Forecast</p>
          <h1>Stock Price Prediction Dashboard</h1>
          <p>Upload your CSV, train the forecast API, and compare actual and predicted prices.</p>
        </div>
      </section>

      <section class="toolbar">
        <label>
          Backend API URL
          <input id="apiUrl" value="https://mlcf-agent-backend-production.up.railway.app" />
        </label>
        <label>
          CSV file
          <input id="csvFile" type="file" accept=".csv" />
        </label>
        <label>
          Lookback
          <input id="lookback" type="number" min="5" max="180" value="20" />
        </label>
        <label>
          Test ratio
          <input id="testRatio" type="number" min="0.05" max="0.5" step="0.05" value="0.2" />
        </label>
        <button id="runBtn">Run Prediction</button>
      </section>

      <p id="status" class="status">Upload a CSV with Date and Close columns.</p>

      <section class="metrics">
        <article><span>Next Day Close</span><strong id="futurePrice">-</strong></article>
        <article><span>Avg Error</span><strong id="mae">-</strong></article>
        <article><span>RMSE</span><strong id="rmse">-</strong></article>
        <article><span>Max Error</span><strong id="maxError">-</strong></article>
      </section>

      <section class="panel">
        <h2>Actual vs Predicted</h2>
        <canvas id="chart"></canvas>
      </section>

      <section class="panel grid">
        <div>
          <h2>Model Training</h2>
          <table>
            <tbody id="summary"></tbody>
          </table>
        </div>
        <div>
          <h2>Model Comparison</h2>
          <table>
            <thead>
              <tr><th>Model</th><th>MAE</th><th>RMSE</th><th>Max Error</th></tr>
            </thead>
            <tbody id="models"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/script.js"></script>
  </body>
</html>
